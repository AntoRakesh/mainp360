<div class="edit-role-container">
  <div class="page-header">
    <div class="header-left">
      <button class="back-btn" (click)="cancel()">
        <i class="ti ti-arrow-left"></i>
      </button>
      <h2>Edit Role</h2>
    </div>
    <div class="header-actions">
      <button class="btn-cancel" (click)="cancel()">Cancel</button>
      <button class="btn-save" (click)="save()" [disabled]="saving || loading">
        {{ saving ? 'Saving...' : 'Save' }}
      </button>
    </div>
  </div>

  <div class="loading-msg" *ngIf="loading">Loading role...</div>

  <div class="split-layout" *ngIf="!loading">

    <!-- Left -->
    <div class="left-panel">
      <div class="panel-title">Role Details</div>
      <div class="form-group">
        <label>Role Name <span class="required">*</span></label>
        <input type="text" [(ngModel)]="roleName" placeholder="Enter role name">
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea [(ngModel)]="description" placeholder="Enter description" rows="4"></textarea>
      </div>
    </div>

    <!-- Right -->
    <div class="right-panel">
      <div class="panel-title">Access Permissions</div>

      <table class="permission-table">
        <thead>
          <tr>
            <th class="feature-col">Feature</th>
            <th class="check-col">
              <div class="check-header">
                <span>View</span>
                <input type="checkbox" [checked]="allViewChecked" (change)="selectAllView()">
              </div>
            </th>
            <th class="check-col">
              <div class="check-header">
                <span>Edit</span>
                <input type="checkbox" [checked]="allEditChecked" (change)="selectAllEdit()">
              </div>
            </th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let permission of permissions">
            <td class="feature-name">{{ permission.featureName }}</td>
            <td class="check-col">
              <input type="checkbox" [(ngModel)]="permission.viewOption">
            </td>
            <td class="check-col">
              <input type="checkbox" [(ngModel)]="permission.editOption">
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>

  <lib-popup-loader *ngIf="saving" text="Saving"></lib-popup-loader>
</div>
